<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<style>:root{
    --color-bg:#f7f3ea;
    --body-bg:#f7f3ea;
    --color-card-bg:#ffffff;
    --color-surface:#efe8d8;
    --color-text:#1a2340;
    --color-accent:#a30f28;
    --font-heading:"Bebas Neue",system-ui,sans-serif;
    --font-heading-weight:400;
    --font-body:"Barlow",system-ui,sans-serif;
    --radius-md:16px;
    --card-blur:0px;
    --card-border-width:1px;
    --avatar-radius:50%;
    --heading-transform:uppercase;
    --heading-letter-spacing:0.02em;
  }</style>
</head>
<body>
<div class="page-wrap">

    
    <div class="cover-photo"><img src="https://picsum.photos/seed/urbanfit4/1200/500" alt="" /></div>
    <div class="avatar-wrap center overlap"><img src="https://picsum.photos/seed/vivid1/200/200" alt="" class="avatar-img ring" /></div>
    <header style="padding:0 var(--space-4) var(--space-4);text-align:center">
      <h1 style="font-size:30px">Rally Supply Co.</h1>
      <p class="text-muted" style="font-size:13px;margin-top:2px">Austin, Texas</p>
      <p class="text-muted" style="font-size:14px;margin-top:var(--space-2)">Independent streetwear, small drops only.</p>
    </header>
    
    
    <div style="display:flex;gap:var(--space-2);padding:0 var(--space-4) var(--space-6)"><a href="tel:555-333-4444" class="btn btn-primary" style="flex:1">Call</a><a href="sms:555-333-4444" class="btn" style="flex:1">Text</a><a href="mailto:shop-check@bizinbio.net" class="btn" style="flex:1">Email</a><a href="https://wa.me/15553334444" class="btn" style="flex:1" target="_blank" rel="noopener">WhatsApp</a></div>
    
    <section style="padding:0 var(--space-4) var(--space-6)">
      <h6 style="color:var(--color-accent-700);margin-bottom:var(--space-2)">Shop</h6>
      <div class="gallery">
        <div class="blueprint" style="position:relative;padding:var(--space-2);display:flex;flex-direction:column;gap:6px">
          <div style="aspect-ratio:1;overflow:hidden;border-radius:var(--radius-md)"><img src="https://picsum.photos/seed/vivid3/400/400" alt="" style="width:100%;height:100%;object-fit:cover;display:block" /></div>
          <span style="font-size:13px;font-weight:600;line-height:1.3">Logo Tee</span>
          <span style="font-size:13px;color:var(--color-accent-700);font-family:var(--font-heading);font-weight:600">$28.00</span>
          <button type="button" class="btn btn-secondary bib-add-cart" data-id="1da9fc05-a604-4986-ae4f-74c3410327a6" data-name="Logo Tee" data-price="2800" style="margin-top:2px;font-size:12px;padding:8px">Add to cart</button>
        </div>
        <div class="blueprint" style="position:relative;padding:var(--space-2);display:flex;flex-direction:column;gap:6px">
          <div style="aspect-ratio:1;overflow:hidden;border-radius:var(--radius-md)"><img src="https://picsum.photos/seed/vivid6/400/400" alt="" style="width:100%;height:100%;object-fit:cover;display:block" /></div>
          <span style="font-size:13px;font-weight:600;line-height:1.3">Crewneck</span>
          <span style="font-size:13px;color:var(--color-accent-700);font-family:var(--font-heading);font-weight:600">$54.00</span>
          <button type="button" class="btn btn-secondary bib-add-cart" data-id="b9cba4f8-7bf0-49dc-ad5c-c7f84d4788f6" data-name="Crewneck" data-price="5400" style="margin-top:2px;font-size:12px;padding:8px">Add to cart</button>
        </div></div>
    </section>
    <div id="bib-cart-bar" style="display:none;position:sticky;bottom:0;background:var(--color-card-bg);border-top:1px solid var(--color-divider);padding:var(--space-3) var(--space-4);align-items:center;gap:var(--space-3);z-index:5">
      <span id="bib-cart-summary" style="flex:1;font-size:13px"></span>
      <button id="bib-cart-checkout" class="btn btn-primary" style="flex:none">Checkout</button>
    </div>
    <script>
      (function () {
        var CART_KEY = 'bib_cart_' + "7c0e27a4-a14e-4769-9977-888ce7686698";
        var params = new URLSearchParams(window.location.search);
        if (params.get('shop') === 'success') localStorage.removeItem(CART_KEY);
        function getCart() { try { return JSON.parse(localStorage.getItem(CART_KEY)) || {}; } catch (e) { return {}; } }
        function setCart(c) { localStorage.setItem(CART_KEY, JSON.stringify(c)); renderBar(); }
        function renderBar() {
          var cart = getCart();
          var ids = Object.keys(cart);
          var bar = document.getElementById('bib-cart-bar');
          if (!ids.length) { bar.style.display = 'none'; return; }
          var count = 0, total = 0;
          ids.forEach(function (id) { count += cart[id].qty; total += cart[id].qty * cart[id].price; });
          document.getElementById('bib-cart-summary').textContent = count + (count === 1 ? ' item — $' : ' items — $') + (total / 100).toFixed(2);
          bar.style.display = 'flex';
        }
        document.querySelectorAll('.bib-add-cart').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var cart = getCart();
            var id = btn.dataset.id;
            if (!cart[id]) cart[id] = { qty: 0, price: Number(btn.dataset.price), name: btn.dataset.name };
            cart[id].qty += 1;
            setCart(cart);
            var original = btn.textContent;
            btn.textContent = 'Added';
            setTimeout(function () { btn.textContent = original; }, 1100);
          });
        });
        document.getElementById('bib-cart-checkout').addEventListener('click', async function () {
          var cart = getCart();
          var items = Object.keys(cart).map(function (id) { return { productId: id, quantity: cart[id].qty }; });
          var btn = this;
          var original = btn.textContent;
          btn.disabled = true;
          btn.textContent = 'Redirecting...';
          try {
            var res = await fetch("https://eqsxcbmcsjrtnkevaygy.supabase.co" + '/functions/v1/create-shop-checkout', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey': "sb_publishable_DPifKzXa875ieM2CLgMieA_VJyYRa-6",
                'Authorization': 'Bearer ' + "sb_publishable_DPifKzXa875ieM2CLgMieA_VJyYRa-6"
              },
              body: JSON.stringify({ pageId: "7c0e27a4-a14e-4769-9977-888ce7686698", items: items })
            });
            var data = await res.json();
            if (!res.ok || !data.url) throw new Error(data.error || 'failed');
            window.location.href = data.url;
          } catch (err) {
            alert('Something went wrong — please try again.');
            btn.disabled = false;
            btn.textContent = original;
          }
        });
        renderBar();
      })();
    </script><footer style="padding:var(--space-6) var(--space-4);text-align:center;border-top:1px solid var(--color-divider)">
      
      <span class="text-muted" style="font-size:12px">Powered by BizInBio</span>
    </footer>
</div>
</body>
</html>
