<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BizInBio — a real website in minutes</title>
<link rel="icon" href="../assets/favicon-32.png?v=1" />
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png?v=1" />
<link rel="stylesheet" href="../assets/site.css?v=11" />
</head>
<body>
<div style="max-width:400px;margin:0 auto;padding:calc(var(--space-8)*2) var(--space-4)">

  <div style="text-align:center;margin-bottom:var(--space-6)">
    <span class="nav-brand" style="font-size:24px">Biz<span style="color:var(--color-accent)">In</span>Bio</span>
    <p class="text-muted" style="margin-top:var(--space-2);font-size:14px">Get a real website for your business in minutes.</p>
  </div>

  <div class="blueprint" style="position:relative;padding:var(--space-6)">
    <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-4)">
      <button class="btn" id="tab-signup" style="flex:1">Sign up</button>
      <button class="btn" id="tab-login" style="flex:1">Log in</button>
    </div>
    <form id="auth-form" style="display:flex;flex-direction:column;gap:var(--space-3)">
      <input class="input" type="email" name="email" placeholder="Email" required />
      <input class="input" type="password" name="password" placeholder="Password" required minlength="6" />
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn" style="margin-top:var(--space-2)">Create my page</button>
    </form>
    <p class="text-muted" style="text-align:center;font-size:13px;margin-top:var(--space-3);min-height:18px" id="msg"></p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="app.js?v=6"></script>
<script>
  let mode = "signup";
  const tabSignup = document.getElementById("tab-signup");
  const tabLogin = document.getElementById("tab-login");
  const submitBtn = document.getElementById("submit-btn");
  const msg = document.getElementById("msg");

  function setMode(next) {
    mode = next;
    tabSignup.classList.toggle("btn-primary", mode === "signup");
    tabLogin.classList.toggle("btn-primary", mode === "login");
    submitBtn.textContent = mode === "signup" ? "Create my page" : "Log in";
  }
  setMode("signup");

  tabSignup.addEventListener("click", () => setMode("signup"));
  tabLogin.addEventListener("click", () => setMode("login"));

  document.getElementById("auth-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = e.target.email.value;
    const password = e.target.password.value;
    msg.textContent = "Working...";
    try {
      const { error } = mode === "signup"
        ? await sb.auth.signUp({ email, password })
        : await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      await routeAfterAuth();
    } catch (err) {
      msg.textContent = err.message || "Something went wrong.";
    }
  });

  async function routeAfterAuth() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      msg.textContent = "Check your email to confirm your account.";
      return;
    }
    const { data: page } = await sb
      .from("pages")
      .select("id")
      .eq("user_id", session.user.id)
      .maybeSingle();
    window.location.href = page ? "/app/dashboard.html" : "/app/onboarding.html";
  }

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) await routeAfterAuth();
  })();
</script>
</body>
</html>
