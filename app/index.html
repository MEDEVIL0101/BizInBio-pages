<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BizInBio — a real website in minutes</title>
<link rel="icon" href="../assets/favicon-32.png?v=1" />
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png?v=1" />
<link rel="stylesheet" href="../assets/site.css?v=15" />
</head>
<body>
<div style="max-width:400px;margin:0 auto;padding:calc(var(--space-8)*2) var(--space-4)">

  <div style="text-align:center;margin-bottom:var(--space-6)">
    <span class="nav-brand" style="font-size:24px">Biz<span style="color:var(--color-accent)">In</span>Bio</span>
    <p class="text-muted" style="margin-top:var(--space-2);font-size:14px">Get a real website for your business in minutes.</p>
  </div>

  <div class="blueprint" style="position:relative;padding:var(--space-6)">
    <!-- New account creation is temporarily closed for testing — log in
         only. See CLAUDE.md / this session for how to reopen it. -->
    <p class="text-muted" style="text-align:center;font-size:13px;margin-bottom:var(--space-4)">New accounts are closed right now — log in below.</p>
    <form id="auth-form" style="display:flex;flex-direction:column;gap:var(--space-3)">
      <input class="input" type="email" name="email" placeholder="Email" required />
      <input class="input" type="password" name="password" placeholder="Password" required minlength="6" />
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn" style="margin-top:var(--space-2)">Log in</button>
    </form>
    <p class="text-muted" style="text-align:center;font-size:13px;margin-top:var(--space-3);min-height:18px" id="msg"></p>

    <div id="confirm-screen" style="display:none;text-align:center">
      <h4 class="card-title" style="font-size:19px">Check your email</h4>
      <p class="text-muted" style="font-size:14px;margin-top:var(--space-2)">We sent a confirmation link to <strong id="confirm-email" style="color:var(--color-text)"></strong>. Click it to activate your account, then come back and sign in.</p>
      <button id="resend-btn" class="btn btn-secondary btn-block" style="margin-top:var(--space-5)">Resend confirmation email</button>
      <p class="text-muted" style="text-align:center;font-size:13px;margin-top:var(--space-2);min-height:18px" id="resend-msg"></p>
      <a href="#" id="back-to-sign-in" style="display:block;text-align:center;font-size:13px;margin-top:var(--space-3)">Back to sign in</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="app.js?v=13"></script>
<script>
  // New account creation is temporarily closed for testing — login only.
  // (No signUp() call anywhere in this file. To reopen signups: restore
  // the tab UI/mode toggle from git history and re-enable the sb.auth.signUp
  // path, plus flip "Allow new users to sign up" back on in the Supabase
  // dashboard under Authentication.)
  let pendingEmail = "";
  const msg = document.getElementById("msg");
  const authForm = document.getElementById("auth-form");
  const confirmScreen = document.getElementById("confirm-screen");
  const confirmEmail = document.getElementById("confirm-email");
  const resendBtn = document.getElementById("resend-btn");
  const resendMsg = document.getElementById("resend-msg");
  const backToSignIn = document.getElementById("back-to-sign-in");

  // Shown instead of the form whenever Supabase reports a login blocked on
  // an unconfirmed address.
  function showConfirmScreen(email) {
    pendingEmail = email;
    authForm.style.display = "none";
    msg.textContent = "";
    confirmEmail.textContent = email;
    resendMsg.textContent = "";
    confirmScreen.style.display = "block";
  }

  function showAuthForm() {
    confirmScreen.style.display = "none";
    authForm.style.display = "flex";
    authForm.reset();
  }

  authForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = e.target.email.value;
    const password = e.target.password.value;
    msg.textContent = "Working...";
    try {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        if (/email/i.test(error.message || "") && /confirm/i.test(error.message || "")) {
          showConfirmScreen(email);
          return;
        }
        throw error;
      }
      await routeAfterAuth(email);
    } catch (err) {
      msg.textContent = err.message || "Something went wrong.";
    }
  });

  async function routeAfterAuth(email) {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      showConfirmScreen(email);
      return;
    }
    const { data: page } = await sb
      .from("pages")
      .select("id")
      .eq("user_id", session.user.id)
      .maybeSingle();
    window.location.href = page ? "/app/dashboard.html" : "/app/onboarding.html";
  }

  resendBtn.addEventListener("click", async () => {
    resendMsg.textContent = "Sending...";
    try {
      const { error } = await sb.auth.resend({
        type: "signup",
        email: pendingEmail,
        options: { emailRedirectTo: `${window.location.origin}/app/index.html` },
      });
      if (error) throw error;
      resendMsg.textContent = "Sent! Check your inbox.";
    } catch (err) {
      resendMsg.textContent = err.message || "Something went wrong.";
    }
  });

  backToSignIn.addEventListener("click", (e) => {
    e.preventDefault();
    showAuthForm();
  });

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) await routeAfterAuth();
  })();
</script>
</body>
</html>
