<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Start your page — BizInBio</title>
<link rel="icon" href="../assets/favicon-32.png?v=1" />
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png?v=1" />
<link rel="stylesheet" href="../assets/site.css?v=17" />
</head>
<body>
<div class="page-wrap" style="padding:var(--space-6) var(--space-4) calc(var(--space-8)*2);gap:calc(var(--space-8)*1.5)">

  <div style="text-align:center">
    <h1>Start your page</h1>
    <p class="text-muted" style="font-size:13px;margin-top:4px">Pick a category and a name — you'll build out everything else next.</p>
  </div>

  <section>
    <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-4)"><span class="step-num">1</span><h6 style="margin:0">Your category</h6></div>
    <div id="category-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2)"></div>
  </section>

  <section>
    <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-4)"><span class="step-num">2</span><h6 style="margin:0">Name</h6></div>
    <div class="field">
      <input class="input" id="business_name" placeholder="Your business name" />
      <p class="text-muted" style="font-size:12px;margin-top:6px">This will be the name shown on your page.</p>
    </div>
  </section>

  <section>
    <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-4)"><span class="step-num">3</span><h6 style="margin:0">Your URL</h6></div>
    <div style="display:flex;align-items:center;background:var(--color-surface);border-radius:var(--radius-md);padding:0 12px">
      <span class="text-muted" style="font-size:14px;white-space:nowrap">bizinbio.net/</span>
      <input class="input" id="slug-input" style="border:none;background:transparent;padding:11px 4px" placeholder="yourname" />
    </div>
    <p class="text-muted" style="font-size:12px;margin-top:6px;min-height:16px" id="slug-status"></p>
  </section>

  <button id="create-page" class="btn btn-primary btn-block" style="padding:14px" disabled>Create my page</button>
  <p class="text-muted" style="text-align:center;font-size:13px;min-height:18px" id="msg"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="app.js?v=13"></script>
<script>
  let session, selectedCategory = null;
  let slugEditedManually = false;
  let slugIsAvailable = false;
  let slugCheckToken = 0;

  const categoryGrid = document.getElementById("category-grid");
  const nameInput = document.getElementById("business_name");
  const slugInput = document.getElementById("slug-input");
  const slugStatus = document.getElementById("slug-status");
  const createBtn = document.getElementById("create-page");
  const msg = document.getElementById("msg");

  CATEGORIES.forEach((cat, i) => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (i === 0 ? " sel" : "");
    btn.type = "button";
    btn.innerHTML = `<span class="name">${cat.label}</span><span class="text-muted" style="font-size:11px">${cat.blurb}</span>`;
    btn.addEventListener("click", () => {
      selectedCategory = cat;
      [...categoryGrid.children].forEach((c) => c.classList.remove("sel"));
      btn.classList.add("sel");
      checkReady();
    });
    categoryGrid.appendChild(btn);
  });

  // default-select the first category on load
  selectedCategory = CATEGORIES[0];

  async function checkSlug() {
    const slug = slugInput.value.trim();
    const token = ++slugCheckToken;
    if (!slug) {
      slugIsAvailable = false;
      slugStatus.textContent = "";
      checkReady();
      return;
    }
    slugStatus.textContent = "Checking...";
    const available = await slugAvailable(slug);
    if (token !== slugCheckToken) return; // a newer check superseded this one
    slugIsAvailable = available;
    slugStatus.textContent = available ? "Available" : "Already taken — try something else";
    slugStatus.style.color = available ? "" : "var(--color-accent-700)";
    checkReady();
  }

  nameInput.addEventListener("input", () => {
    checkReady();
    if (!slugEditedManually) {
      slugInput.value = slugify(nameInput.value.trim());
      checkSlug();
    }
  });

  slugInput.addEventListener("input", () => {
    slugEditedManually = true;
    slugInput.value = slugInput.value.toLowerCase().replace(/[^a-z0-9-]+/g, "-");
    checkSlug();
  });

  function checkReady() {
    createBtn.disabled = !(selectedCategory && nameInput.value.trim() && slugInput.value.trim() && slugIsAvailable);
  }

  createBtn.addEventListener("click", async () => {
    createBtn.disabled = true;
    msg.textContent = "Creating your page...";
    try {
      const businessName = nameInput.value.trim();
      const slug = slugInput.value.trim();

      const { data: page, error: pageErr } = await sb
        .from("pages")
        .insert({
          user_id: session.user.id,
          slug,
          theme: "coral",
          business_category: selectedCategory.id,
          business_name: businessName,
          og_title: businessName,
        })
        .select()
        .single();
      if (pageErr) {
        // Unique violation on user_id: a page already exists for this
        // account (e.g. a double-click, or a retry after a network
        // hiccup on a previous attempt that actually succeeded) — go
        // straight to it instead of showing a raw DB error.
        if (pageErr.message && pageErr.message.includes("pages_one_per_user_idx")) {
          window.location.href = "/app/builder.html";
          return;
        }
        // Someone else grabbed this exact URL between the availability
        // check and submitting — rare, but possible.
        if (pageErr.message && pageErr.message.includes("pages_slug_key")) {
          msg.textContent = "That URL was just taken — please choose another.";
          createBtn.disabled = false;
          return;
        }
        throw pageErr;
      }

      const order = CATEGORY_ELEMENTS[selectedCategory.id];
      const elements = order.map((type, i) => {
        const content = JSON.parse(JSON.stringify(ELEMENT_DEFAULTS[type]));
        if (type === "header") content.business_name = businessName;
        if (type === "contact") {
          const emailMethod = content.methods.find((m) => m.id === "email");
          emailMethod.value = session.user.email;
          emailMethod.enabled = true;
        }
        return { page_id: page.id, type, position: i, content };
      });
      const { error: elErr } = await sb.from("elements").insert(elements);
      if (elErr) throw elErr;

      await callFunction("render-page", { page_id: page.id }, session);

      window.location.href = "/app/builder.html";
    } catch (err) {
      msg.textContent = err.message || "Something went wrong.";
      createBtn.disabled = false;
    }
  });

  (async () => {
    session = await requireSession();
    if (!session) return;
    const { data: existing } = await sb
      .from("pages")
      .select("id")
      .eq("user_id", session.user.id)
      .maybeSingle();
    if (existing) window.location.href = "/app/dashboard.html";
  })();
</script>
</body>
</html>
