<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page builder — BizInBio</title>
<link rel="icon" href="../assets/favicon-32.png?v=1" />
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png?v=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../assets/bib-chrome.css?v=1" />
<style>
  /* Builder-only layout/components — shared chrome (tokens, top bar,
     cards, fields, buttons, toggles) lives in bib-chrome.css so
     dashboard.html can match this look without duplicating it. */
  .bib-app{height:100vh;overflow:hidden;display:flex;flex-direction:column}
  .bib-body{flex:1;display:flex;overflow:hidden;position:relative}
  .bib-editor{width:460px;flex-shrink:0;overflow-y:auto;padding:28px 24px 80px;display:flex;flex-direction:column;gap:18px;background:var(--bib-panel-bg);border-right:1px solid var(--bib-border)}
  .bib-card-head{margin-bottom:4px}

  .bib-swatch{width:42px;height:42px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.1);transition:transform .15s ease;padding:0}
  .bib-swatch:hover{transform:scale(1.08)}
  .bib-swatch.sel::after{content:"";position:absolute;inset:-5px;border-radius:50%;border:2.5px solid var(--swatch-ring, currentColor)}
  .bib-custom-swatch{background:conic-gradient(from 0deg,#ff6b4a,#ffd166,#4dd6a8,#4a9bff,#b46bff,#ff6b4a)}

  .bib-fontpair-btn{text-align:left;padding:12px;border-radius:14px;background:oklch(97% 0.01 70);border:1.5px solid transparent;cursor:pointer}
  .bib-fontpair-btn:hover{background:oklch(95% 0.015 70)}
  .bib-fontpair-btn.sel{border-color:var(--bib-accent);background:oklch(96% 0.05 30)}
  .bib-fontpair-aa{font-size:19px;font-weight:700;margin-bottom:2px}
  .bib-fontpair-name{font-size:12px;font-weight:600;color:oklch(35% 0.02 50)}

  .bib-el-card{background:var(--bib-card-bg);border-radius:18px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.03),0 8px 20px oklch(60% 0.03 60 / .05);animation:cardIn .35s ease both;border:1px solid var(--bib-border)}
  .bib-el-card.drag-over{border:2px dashed var(--bib-accent)}
  .bib-el-card.bib-drag-lift{opacity:.4}
  .bib-el-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer}
  .bib-drag-handle{cursor:grab;touch-action:none;color:oklch(75% 0.01 60);padding:4px;flex:none;display:flex}
  .bib-el-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .bib-el-title{font-size:14px;font-weight:700}
  .bib-el-summary{font-size:12px;color:var(--bib-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bib-chevron{color:var(--bib-muted);display:flex;flex:none;transition:transform .2s ease;padding:6px;border-radius:8px}
  .bib-chevron:hover{background:oklch(94% 0.02 60)}
  .bib-el-panel{padding:4px 16px 18px}

  .bib-gated-banner{display:flex;align-items:flex-start;gap:10px;border-radius:14px;padding:12px 14px;margin-bottom:14px;font-size:12.5px;line-height:1.5}
  .bib-gated-banner svg{flex-shrink:0;margin-top:2px}

  .bib-gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .bib-gallery-tile{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden}
  .bib-gallery-tile img{width:100%;height:100%;object-fit:cover;display:block}
  .bib-gallery-remove{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:oklch(30% 0.02 30 / .65);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;padding:0}
  .bib-gallery-add{aspect-ratio:1;border-radius:12px;border:2px dashed oklch(85% 0.015 70);background:oklch(97% 0.01 70);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--bib-muted)}
  .bib-gallery-add:hover{border-color:var(--bib-accent);color:var(--bib-accent)}

  .bib-add-section-btn{width:100%;padding:14px;border-radius:14px;border:1.5px dashed oklch(82% 0.02 60);background:#fff;color:var(--bib-muted);font-weight:700;font-size:13.5px;cursor:pointer}
  .bib-add-section-btn:hover{border-color:var(--bib-accent);color:var(--bib-accent)}
  .bib-add-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .bib-add-card{text-align:left;padding:16px;border-radius:16px;background:#fff;border:1px solid var(--bib-border);cursor:pointer;position:relative;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .bib-add-card .bib-add-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
  .bib-add-card .bib-add-title{font-size:14.5px;font-weight:700}
  .bib-all-access-badge{position:absolute;top:12px;right:12px;background:oklch(93% 0.09 150);color:oklch(38% 0.13 150);font-size:9.5px;font-weight:800;letter-spacing:.04em;padding:4px 8px;border-radius:999px}

  .bib-preview-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:auto;padding:40px}
  .bib-preview-label{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--bib-muted);display:flex;align-items:center;gap:6px}
  .bib-phone{width:auto;height:min(844px, calc(100vh - 180px));aspect-ratio:390/844;max-width:100%;border-radius:52px;border:10px solid #111;background:#111;box-shadow:0 30px 60px rgba(0,0,0,.25);overflow:hidden;position:relative;flex-shrink:0}
  .bib-phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#111;border-radius:0 0 16px 16px;z-index:5}
  .bib-phone-screen{width:100%;height:100%;overflow-y:auto;background:#fff}
</style>
</head>
<body>

<div class="bib-app">
  <div class="bib-topbar">
    <div style="display:flex;align-items:center;gap:20px">
      <a href="/app/dashboard.html" class="bib-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back to dashboard
      </a>
      <div class="bib-divider-v"></div>
      <div class="bib-wordmark">
        <img src="../assets/bee-icon.png?v=1" alt="BizInBio" class="bib-wordmark-mark" />
        <span class="bib-wordmark-text">Biz<span class="accent">In</span>Bio</span>
        <span class="bib-wordmark-label">builder</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <a id="page-url" class="bib-url-pill" href="#" target="_blank" rel="noopener"></a>
      <span id="status-badge" class="bib-live-pill"><span class="bib-live-dot"></span><span id="status-badge-text">Live</span></span>
      <button id="save-republish-btn" class="bib-save-btn" type="button">Save &amp; publish</button>
    </div>
  </div>

  <div class="bib-body">
    <div class="bib-editor" id="editor-panel"></div>
    <div class="bib-preview-wrap">
      <div class="bib-preview-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 4a8 8 0 100 16 8 8 0 000-16z" stroke="currentColor" stroke-width="2"/><path d="M12 8v4l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Live preview
      </div>
      <div class="bib-phone">
        <div class="bib-phone-notch"></div>
        <div class="bib-phone-screen" id="preview-screen"></div>
      </div>
    </div>
  </div>

  <div class="bib-toast" id="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="app.js?v=12"></script>
<script>
  // ---------------------------------------------------------------------
  // Section catalog — title/hue/paywalled/icon per non-header element type.
  // Icon bubble and paywall-banner colors are both derived from `hue` via
  // one consistent oklch formula (see hueBg/hueFg/hueBannerBg/hueBannerFg
  // below) rather than hand-tuning each — visually equivalent to the design
  // handoff's per-type values, far less code to keep in sync.
  const SECTION_META = {
    contact: { title: "Contact", hue: 30, paywalled: false,
      icon: `<path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.9 21 3 13.1 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z" stroke-linejoin="round"/>` },
    about: { title: "About", hue: 250, paywalled: false,
      icon: `<path d="M4 6h16M4 12h16M4 18h10" stroke-linecap="round"/>` },
    social_link: { title: "Social & links", hue: 190, paywalled: false,
      icon: `<path d="M10 13a5 5 0 007.07 0l2-2a5 5 0 00-7.07-7.07l-1 1M14 11a5 5 0 00-7.07 0l-2 2a5 5 0 007.07 7.07l1-1" stroke-linecap="round"/>` },
    portfolio_gallery: { title: "Gallery", hue: 320, paywalled: true,
      icon: `<rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M3 17l5-4 4 3 4-5 5 6" stroke-linecap="round" stroke-linejoin="round"/>` },
    services_list: { title: "Services", hue: 90, paywalled: true,
      icon: `<path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/><circle cx="4" cy="6" r="1.4" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.4" fill="currentColor" stroke="none"/>` },
    quote_request_form: { title: "Quote request form", hue: 350, paywalled: true,
      icon: `<rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5" stroke-linecap="round"/>` },
    service_area: { title: "Service area", hue: 150, paywalled: true,
      icon: `<path d="M12 21s-7-6.5-7-11a7 7 0 0114 0c0 4.5-7 11-7 11z" stroke-linejoin="round"/><circle cx="12" cy="10" r="2.3"/>` },
    booking_deposit: { title: "Booking deposit", hue: 270, paywalled: true,
      icon: `<rect x="4" y="5" width="16" height="15" rx="2"/><path d="M4 9h16M8 3v4M16 3v4" stroke-linecap="round"/>` },
    product_shop: { title: "Shop", hue: 55, paywalled: true,
      icon: `<path d="M6 8h12l-1 12a2 2 0 01-2 2H9a2 2 0 01-2-2L6 8z" stroke-linejoin="round"/><path d="M9 8V6a3 3 0 016 0v2"/>` },
  };
  const ALL_SECTION_TYPES = Object.keys(SECTION_META);

  function hueBg(hue) { return `oklch(90% 0.05 ${hue})`; }
  function hueFg(hue) { return `oklch(49% 0.16 ${hue})`; }
  function hueBannerBg(hue) { return `oklch(95% 0.05 ${hue})`; }
  function hueBannerFg(hue) { return `oklch(30% 0.1 ${hue})`; }

  function sectionIconSvg(type, size) {
    const meta = SECTION_META[type];
    if (!meta) return "";
    return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${meta.icon}</svg>`;
  }

  function escapeHtml(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // Users routinely type "instagram.com/handle" instead of a full URL —
  // without a scheme that renders as a link relative to the page itself,
  // a 404. Default to https:// whenever no scheme is present.
  function normalizeUrl(raw) {
    const url = String(raw || "").trim();
    if (!url) return "";
    return /^[a-z][a-z0-9+.-]*:/i.test(url) ? url : `https://${url}`;
  }

  const UP_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`;
  const DOWN_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>`;
  const TRASH_ICON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2m2 0v13a2 2 0 01-2 2H9a2 2 0 01-2-2V7h10z"/></svg>`;
  const CHEVRON_ICON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>`;
  const GRIP_ICON = `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="3" r="1.4"/><circle cx="11" cy="3" r="1.4"/><circle cx="5" cy="8" r="1.4"/><circle cx="11" cy="8" r="1.4"/><circle cx="5" cy="13" r="1.4"/><circle cx="11" cy="13" r="1.4"/></svg>`;
  const UPLOAD_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v3a2 2 0 002 2h12a2 2 0 002-2v-3"/></svg>`;
  const CLOSE_ICON = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>`;

  const CONTACT_ICONS = {
    phone: `<path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.9 21 3 13.1 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z" stroke-linejoin="round"/>`,
    email: `<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M4 6.5l8 6 8-6" stroke-linecap="round" stroke-linejoin="round"/>`,
    whatsapp: `<path d="M12 3a9 9 0 00-7.8 13.4L3 21l4.7-1.2A9 9 0 1012 3z" stroke-linejoin="round"/><path d="M8.5 12a3.5 3.5 0 007 0" stroke-linecap="round"/>`,
  };
  function contactIconSvg(type, size) {
    return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${CONTACT_ICONS[type] || ""}</svg>`;
  }

  // ---------------------------------------------------------------------
  // Drag-and-drop — Pointer Events, not the HTML5 native DnD API (no
  // reliable touch support there, and this app's usage skews mobile).
  function initDragList(container, itemClass, onReorder) {
    container.addEventListener("pointerdown", (e) => {
      const handle = e.target.closest(".bib-drag-handle");
      if (!handle) return;
      const item = handle.closest("." + itemClass);
      if (!item || item.parentElement !== container) return;

      let curStartY = e.clientY;
      item.setPointerCapture(e.pointerId);
      item.classList.add("bib-drag-lift");
      e.preventDefault();

      function onMove(ev) {
        const delta = ev.clientY - curStartY;
        item.style.transform = `translateY(${delta}px)`;
        const rect = item.getBoundingClientRect();
        const prev = item.previousElementSibling;
        if (prev && prev.classList.contains(itemClass)) {
          const pr = prev.getBoundingClientRect();
          if (rect.top < pr.top + pr.height / 2) {
            container.insertBefore(item, prev);
            curStartY -= pr.height;
            item.style.transform = `translateY(${ev.clientY - curStartY}px)`;
            return;
          }
        }
        const next = item.nextElementSibling;
        if (next && next.classList.contains(itemClass)) {
          const nr = next.getBoundingClientRect();
          if (rect.bottom > nr.top + nr.height / 2) {
            container.insertBefore(next, item);
            curStartY += nr.height;
            item.style.transform = `translateY(${ev.clientY - curStartY}px)`;
          }
        }
      }
      function onUp(ev) {
        item.releasePointerCapture(ev.pointerId);
        item.removeEventListener("pointermove", onMove);
        item.removeEventListener("pointerup", onUp);
        item.removeEventListener("pointercancel", onUp);
        item.classList.remove("bib-drag-lift");
        item.style.transform = "";
        const orderedEls = [...container.querySelectorAll(":scope > ." + itemClass)];
        onReorder(orderedEls);
      }
      item.addEventListener("pointermove", onMove);
      item.addEventListener("pointerup", onUp);
      item.addEventListener("pointercancel", onUp);
    });
  }

  // ---------------------------------------------------------------------
  // State — local-first: every edit accumulates here and is only written
  // to Supabase (+ republished) on one explicit Save & republish click.
  // This is what closes off the class of bug hit earlier with per-section
  // auto-save (unsaved edits silently discarded on panel reopen) — there's
  // no longer a separate persisted-vs-pending state to fall out of sync.
  let session, page, isPaid = false;
  let headerElId = null;
  let headerContent = { business_name: "", location: "", logo_url: "", cover_image_url: "" };
  let elements = []; // all non-header elements, in position order
  let theme = { paletteId: "coral", customAccent: PALETTES[0].primary, customBg: PALETTES[0].bg, fontPairId: "playful" };
  let expandedId = null;
  let addMenuOpen = false;
  let editingField = null; // 'businessName' | 'location' | null
  let dirty = false;
  let nextTempId = 1;
  const deletedIds = new Set();

  function tempId() { return "temp-" + (nextTempId++) + "-" + Date.now(); }
  function isTemp(id) { return String(id).startsWith("temp-"); }
  function isGated(type) { return !isPaid && SECTION_META[type] && SECTION_META[type].paywalled; }
  function elById(id) { return elements.find((e) => e.id === id); }
  function markDirty() { dirty = true; }

  window.addEventListener("beforeunload", (e) => {
    if (!dirty) return;
    e.preventDefault();
    e.returnValue = "";
  });

  function showToast(message, isError) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.className = "bib-toast" + (isError ? " error" : "");
    toast.style.display = "flex";
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => { toast.style.display = "none"; }, 2600);
  }

  // ---------------------------------------------------------------------
  // Summaries (section-card subtitle line)
  function summaryFor(el) {
    const c = el.content || {};
    switch (el.type) {
      case "about": return c.bio ? c.bio.slice(0, 44) : "No bio yet";
      case "contact": {
        const on = (c.methods || []).filter((m) => m.enabled).map((m) => m.label);
        return on.length ? on.join(", ") : "Nothing shown yet";
      }
      case "social_link": { const n = (c.links || []).length; return n ? `${n} link${n === 1 ? "" : "s"}` : "No links yet"; }
      case "portfolio_gallery": { const n = (c.photos || []).length; return n ? `${n} photo${n === 1 ? "" : "s"}` : "No photos yet"; }
      case "services_list": { const n = (c.services || []).length; return n ? `${n} service${n === 1 ? "" : "s"}` : "No services yet"; }
      case "quote_request_form": { const n = (c.fields || []).filter((f) => f.enabled).length; return `${n} field${n === 1 ? "" : "s"} enabled`; }
      case "service_area": return c.area || "Not set";
      case "booking_deposit": { const on = Number(c.deposit_amount) > 0 || el._depositOn; return on ? `$${c.deposit_amount || "0"} deposit` : "Off"; }
      case "product_shop": return "Manage products on your dashboard";
      default: return "";
    }
  }

  // ---------------------------------------------------------------------
  // Editor panel — full re-render on discrete actions (add/remove/reorder/
  // toggle/expand). Text inputs mutate state directly + only refresh the
  // live preview (see wireEditorEvents), so typing never loses focus.
  function renderEditor() {
    const panel = document.getElementById("editor-panel");
    panel.innerHTML = headerCardHtml() + themeCardHtml() +
      `<div class="bib-section-heading">Page content</div>` +
      `<div id="element-list" style="display:flex;flex-direction:column;gap:10px">${elements.map(elementCardHtml).join("")}</div>` +
      `<button type="button" id="add-section-toggle" class="bib-add-section-btn">+ Add section</button>` +
      (addMenuOpen ? `<div class="bib-add-grid" id="add-section-grid">${ALL_SECTION_TYPES.map(addCardHtml).join("")}</div>` : "");
    wireEditorEvents(panel);
    const list = document.getElementById("element-list");
    initDragList(list, "bib-el-card", (orderedEls) => {
      const byId = new Map(elements.map((e) => [e.id, e]));
      elements = orderedEls.map((el) => byId.get(el.dataset.id)).filter(Boolean);
      markDirty();
      renderPreview();
    });
  }

  function headerCardHtml() {
    return `
      <div class="bib-card">
        <div class="bib-card-head">
          <div class="bib-card-icon" style="background:${hueBg(30)};color:${hueFg(30)}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M3 17l5-4 4 3 4-5 5 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div>
            <div class="bib-card-title">Header</div>
            <div class="bib-card-sub">Always shown first — not reorderable</div>
          </div>
        </div>
        <div style="position:relative;margin:14px -20px 0">
          <label class="bib-upload" id="h-cover-drop" style="width:100%;height:150px;border-radius:0">

            ${headerContent.logo_url ? `<img src="${escapeHtml(headerContent.logo_url)}" />` : `<span style="font-size:10px">Photo</span>`}

            <div class="bib-field-label">Business name</div>

  function themeCardHtml() {
    const isCustom = theme.paletteId === "custom";
    return `
      <div class="bib-card">
        <div class="bib-card-head" style="margin-bottom:16px">
          <div class="bib-card-icon" style="background:${hueBg(300)};color:${hueFg(300)}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="13.5" cy="6.5" r="3" fill="currentColor"/><circle cx="6" cy="12" r="3" fill="currentColor"/><circle cx="17" cy="17.5" r="3" fill="currentColor"/></svg>
          </div>
          <div>
            <div class="bib-card-title">Theme</div>
            <div class="bib-card-sub">Colors &amp; fonts for your live page</div>
          </div>

        <div class="bib-field-label">Color palette</div>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:${isCustom ? "14px" : "18px"}">

  function elementCardHtml(el) {

      <div class="bib-el-card" data-id="${el.id}">
        <div class="bib-el-head bib-el-toggle" data-id="${el.id}">
          <span class="bib-drag-handle">${GRIP_ICON}</span>
          <div class="bib-el-icon" style="background:${hueBg(meta.hue)};color:${hueFg(meta.hue)}">${sectionIconSvg(el.type, 15)}</div>

  function gatedBannerHtml(hue) {

  function sectionEditorHtml(el) {
    const c = el.content || {};
    switch (el.type) {
      case "about":
        return `<textarea class="bib-textarea bib-about-input" data-id="${el.id}" placeholder="Tell people what you do...">${escapeHtml(c.bio || "")}</textarea>`;

              <button type="button" class="bib-toggle bib-contact-toggle" data-id="${el.id}" data-method="${m.id}" style="background:${m.enabled ? "var(--bib-accent)" : "oklch(88% 0.015 60)"}">

      case "portfolio_gallery":

            </div>`).join("")}
          <label class="bib-gallery-add" id="gallery-drop-${el.id}">
            <input type="file" accept="image/*" multiple class="bib-gallery-input" data-id="${el.id}" style="display:none" />

      case "social_link":
        return `<div style="display:flex;flex-direction:column;gap:8px">
          ${(c.links || []).map((l, i) => `
            <div style="display:flex;gap:8px;align-items:center">
              <input class="bib-row-input bib-link-label" data-id="${el.id}" data-index="${i}" value="${escapeHtml(l.label || "")}" placeholder="Platform" style="width:90px;flex-shrink:0" />
              <input class="bib-row-input bib-link-url" data-id="${el.id}" data-index="${i}" value="${escapeHtml(l.url || "")}" placeholder="Link or handle" style="flex:1;min-width:0" />
              <button type="button" class="bib-icon-btn bib-remove-link" data-id="${el.id}" data-index="${i}">${CLOSE_ICON}</button>
            </div>`).join("")}
          <button type="button" class="bib-add-link bib-add-link-btn" data-id="${el.id}">+ Add link</button>
        </div>`;

      case "services_list":
        return `<div style="display:flex;flex-direction:column;gap:8px">
          ${!(c.services || []).length ? `<div class="text-muted" style="font-size:13px;color:var(--bib-muted);padding:8px 4px">No services yet.</div>` : ""}
          ${(c.services || []).map((s, i) => `
            <div style="display:flex;gap:8px;align-items:center">
              <input class="bib-row-input bib-service-name" data-id="${el.id}" data-index="${i}" value="${escapeHtml(s.name || "")}" placeholder="Service name" style="flex:1;min-width:0" />
              <input class="bib-row-input bib-service-price" data-id="${el.id}" data-index="${i}" value="${escapeHtml(s.price_range || "")}" placeholder="$" style="width:80px;flex-shrink:0" />
              <button type="button" class="bib-icon-btn bib-remove-service" data-id="${el.id}" data-index="${i}">${CLOSE_ICON}</button>
            </div>`).join("")}
          <button type="button" class="bib-add-link bib-add-service-btn" data-id="${el.id}">+ Add service</button>
        </div>`;

      case "quote_request_form":
        return `<div class="bib-field-label" style="margin-bottom:10px">Fields to collect</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${(c.fields || []).map((f) => `
            <div style="display:flex;align-items:center;gap:10px">
              <button type="button" class="bib-toggle bib-quote-toggle" data-id="${el.id}" data-field="${f.id}" style="background:${f.enabled ? "var(--bib-accent)" : "oklch(88% 0.015 60)"}">
                <span class="bib-toggle-knob" style="transform:translateX(${f.enabled ? "16px" : "0px"})"></span>
              </button>
              <div style="font-size:13.5px;font-weight:600">${escapeHtml(f.label)}</div>

      case "booking_deposit": {

          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">

            <div style="font-size:13.5px;font-weight:600">Require a deposit to book</div>

        return `<p style="font-size:13px;color:var(--bib-muted);line-height:1.5">Products, photos, and pricing are managed on your dashboard — this section just controls where your shop appears on the page.</p>

  const REPEATABLE_TYPES = new Set(["services_list", "portfolio_gallery"]);

  function addCardHtml(type) {
    const meta = SECTION_META[type];
    const gated = isGated(type);
    const alreadyAdded = !REPEATABLE_TYPES.has(type) && elements.some((e) => e.type === type);
    return `
      <button type="button" class="bib-add-card bib-add-section-item" data-type="${type}" data-gated="${gated}" ${alreadyAdded ? "disabled" : ""} style="${alreadyAdded ? "opacity:.55;cursor:not-allowed" : ""}">
        ${meta.paywalled ? `<div class="bib-all-access-badge">ALL ACCESS</div>` : ""}
        <div class="bib-add-icon" style="background:${alreadyAdded ? "oklch(95% 0.008 60)" : hueBg(meta.hue)};color:${alreadyAdded ? "oklch(78% 0.01 60)" : hueFg(meta.hue)}">${sectionIconSvg(type, 18)}</div>
        <div class="bib-add-title" style="color:${alreadyAdded ? "oklch(65% 0.015 60)" : "var(--bib-text)"}">${escapeHtml(meta.title)}</div>
      </button>`;
  }

  // ---------------------------------------------------------------------
  // Live preview — an approximate client-side re-render (not a pixel copy
  // of render-page's actual HTML), reflecting header/theme/about/contact/
  // gallery/social/services in the same position order the real page uses.
  function renderPreview() {
    const screen = document.getElementById("preview-screen");
    const isCustom = theme.paletteId === "custom";
    const palette = isCustom
      ? { primary: theme.customAccent, bg: theme.customBg, text: CUSTOM_TEXT }
      : PALETTES.find((p) => p.id === theme.paletteId) || PALETTES[0];
    const fonts = FONT_PAIRS.find((f) => f.id === theme.fontPairId) || FONT_PAIRS[0];

    const contactEl = elements.find((e) => e.type === "contact");
    const visibleContacts = contactEl ? (contactEl.content.methods || []).filter((m) => m.enabled && (m.value || "").trim()) : [];

    const bodyParts = elements.map((el) => {
      if (isGated(el.type) && el.type !== "portfolio_gallery" && el.type !== "services_list") return "";
      switch (el.type) {
        case "about":
          return el.content.bio ? `<div style="font-size:14.5px;line-height:1.6;text-align:center;margin-top:22px;opacity:.85">${escapeHtml(el.content.bio)}</div>` : "";
        case "portfolio_gallery": {
          const photos = el.content.photos || [];
          if (!photos.length) return "";
          return `<div style="position:relative;width:100%;margin-top:26px">
            ${isGated(el.type) ? `<div style="position:absolute;top:6px;right:6px;background:rgba(20,20,20,.55);color:#fff;font-size:9.5px;font-weight:700;padding:3px 7px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em;z-index:2">All Access</div>` : ""}
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
              ${photos.map((url) => `<div style="aspect-ratio:1;border-radius:10px;overflow:hidden"><img src="${escapeHtml(url)}" style="width:100%;height:100%;object-fit:cover;display:block" /></div>`).join("")}
            </div>
          </div>`;
        }
        case "social_link": {
          const links = (el.content.links || []).filter((l) => (l.label || l.url || "").trim());
          if (!links.length) return "";
          return `<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:24px">
            ${links.map((l) => `<div style="padding:9px 16px;border-radius:999px;background:color-mix(in srgb, ${palette.primary} 14%, transparent);color:${palette.primary};font-size:13px;font-weight:700">${escapeHtml(l.label || l.url)}</div>`).join("")}
          </div>`;
        }
        case "services_list": {
          const services = el.content.services || [];
          if (!services.length) return "";
          return `<div style="width:100%;margin-top:28px;display:flex;flex-direction:column;gap:10px;position:relative">
            ${isGated(el.type) ? `<div style="position:absolute;top:-14px;right:0;background:rgba(20,20,20,.55);color:#fff;font-size:9.5px;font-weight:700;padding:3px 7px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em">All Access</div>` : ""}
            <div style="font-family:${fonts.display};font-weight:700;font-size:16px">Services</div>
            ${services.map((s) => `<div style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:14px;background:color-mix(in srgb, ${palette.primary} 7%, white)">
              <span style="font-size:14px;font-weight:600">${escapeHtml(s.name || "")}</span>
              <span style="font-size:14px;font-weight:700;color:${palette.primary}">${escapeHtml(s.price_range || "")}</span>
            </div>`).join("")}
          </div>`;
        }
        default:
          return "";
      }
    }).join("");

    screen.innerHTML = `
      <div style="min-height:100%;background:${palette.bg};font-family:${fonts.body};color:${palette.text}">
        <div style="width:100%;height:190px;background:oklch(93% 0.01 70)">
          ${headerContent.cover_image_url ? `<img src="${escapeHtml(headerContent.cover_image_url)}" style="width:100%;height:100%;object-fit:cover;display:block" />` : ""}
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;padding:0 24px 40px;margin-top:-38px">
          <div style="width:84px;height:84px;border-radius:50%;border:4px solid ${palette.bg};overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.15);background:#eee">
            ${headerContent.logo_url ? `<img src="${escapeHtml(headerContent.logo_url)}" style="width:100%;height:100%;object-fit:cover;display:block" />` : ""}
          </div>
          <div style="font-family:${fonts.display};font-size:24px;font-weight:700;margin-top:14px;text-align:center">${escapeHtml(headerContent.business_name) || "Your business name"}</div>
          ${headerContent.location ? `<div style="font-size:13px;opacity:.65;margin-top:3px">${escapeHtml(headerContent.location)}</div>` : ""}
          ${visibleContacts.length ? `<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px">
            ${visibleContacts.map((m) => `<div style="display:inline-flex;align-items:center;gap:7px;background:${palette.primary};color:#fff;font-weight:700;font-size:13px;padding:${m.showValue ? "11px 18px" : "13px"};border-radius:999px">${contactIconSvg(m.type, 13)}${m.showValue ? `<span>${escapeHtml(m.value)}</span>` : ""}</div>`).join("")}
          </div>` : ""}
          ${bodyParts}
          <div style="font-size:10.5px;opacity:.4;margin-top:32px">Made with bizinbio</div>
        </div>
      </div>`;
  }

  // ---------------------------------------------------------------------
  // Event wiring (delegated on the editor panel; re-attached each
  // renderEditor() call since the DOM is rebuilt).
  function wireEditorEvents(panel) {
    // Header
    const nameStatic = document.getElementById("h-name-static");
    if (nameStatic) nameStatic.addEventListener("click", () => { editingField = "businessName"; renderEditor(); });
    const locStatic = document.getElementById("h-location-static");
    if (locStatic) locStatic.addEventListener("click", () => { editingField = "location"; renderEditor(); });
    const nameInput = document.getElementById("h-name-input");
    if (nameInput) {
      nameInput.focus();
      nameInput.setSelectionRange(nameInput.value.length, nameInput.value.length);
      nameInput.addEventListener("input", (e) => { headerContent.business_name = e.target.value; markDirty(); renderPreview(); updateElementSummaries(); });
      nameInput.addEventListener("blur", () => { editingField = null; renderEditor(); });
      nameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") nameInput.blur(); });
    }
    const locInput = document.getElementById("h-location-input");
    if (locInput) {
      locInput.focus();
      locInput.setSelectionRange(locInput.value.length, locInput.value.length);
      locInput.addEventListener("input", (e) => { headerContent.location = e.target.value; markDirty(); renderPreview(); });
      locInput.addEventListener("blur", () => { editingField = null; renderEditor(); });
      locInput.addEventListener("keydown", (e) => { if (e.key === "Enter") locInput.blur(); });
    }
    wireImageDrop(document.getElementById("h-cover-drop"), document.getElementById("h-cover-input"), (url) => { headerContent.cover_image_url = url; });
    wireImageDrop(document.getElementById("h-avatar-drop"), document.getElementById("h-avatar-input"), (url) => { headerContent.logo_url = url; });

    // Theme
    panel.querySelectorAll(".bib-palette-btn").forEach((btn) => {
      btn.addEventListener("click", () => { theme.paletteId = btn.dataset.id; markDirty(); renderEditor(); renderPreview(); });
    });
    const customBtn = panel.querySelector(".bib-select-custom-btn");
    if (customBtn) customBtn.addEventListener("click", () => { theme.paletteId = "custom"; markDirty(); renderEditor(); renderPreview(); });
    const accentInput = document.getElementById("custom-accent-input");
    if (accentInput) accentInput.addEventListener("input", (e) => { theme.customAccent = e.target.value; theme.paletteId = "custom"; markDirty(); renderPreview(); });
    const bgInput = document.getElementById("custom-bg-input");
    if (bgInput) bgInput.addEventListener("input", (e) => { theme.customBg = e.target.value; theme.paletteId = "custom"; markDirty(); renderPreview(); });
    panel.querySelectorAll(".bib-fontpair-item").forEach((btn) => {
      btn.addEventListener("click", () => { theme.fontPairId = btn.dataset.id; markDirty(); renderEditor(); renderPreview(); });
    });

    // Section list — toggle/remove
    panel.querySelectorAll(".bib-el-toggle").forEach((head) => {
      head.addEventListener("click", (e) => {
        if (e.target.closest(".bib-drag-handle") || e.target.closest(".bib-remove-el-btn")) return;
        const id = head.dataset.id;
        expandedId = expandedId === id ? null : id;
        renderEditor();
      });
    });
    panel.querySelectorAll(".bib-remove-el-btn").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        if (!confirm("Delete this section? This can't be undone.")) return;
        const id = btn.dataset.id;
        if (!isTemp(id)) deletedIds.add(id);
        elements = elements.filter((el) => el.id !== id);
        if (expandedId === id) expandedId = null;
        markDirty();
        renderEditor();
        renderPreview();
      });
    });

    // About
    const aboutInput = panel.querySelector(".bib-about-input");
    if (aboutInput) aboutInput.addEventListener("input", (e) => { elById(e.target.dataset.id).content.bio = e.target.value; markDirty(); renderPreview(); updateElementSummaries(); });

    // Contact
    panel.querySelectorAll(".bib-contact-toggle").forEach((btn) => {
      btn.addEventListener("click", () => {
        const m = elById(btn.dataset.id).content.methods.find((x) => x.id === btn.dataset.method);
        m.enabled = !m.enabled;
        markDirty(); renderEditor(); renderPreview();
      });
    });
    panel.querySelectorAll(".bib-contact-showvalue").forEach((btn) => {
      btn.addEventListener("click", () => {
        const m = elById(btn.dataset.id).content.methods.find((x) => x.id === btn.dataset.method);
        m.showValue = !m.showValue;
        markDirty(); renderEditor(); renderPreview();
      });
    });
    panel.querySelectorAll(".bib-contact-value").forEach((input) => {
      input.addEventListener("input", (e) => {
        const m = elById(e.target.dataset.id).content.methods.find((x) => x.id === e.target.dataset.method);
        m.value = e.target.value;
        markDirty(); renderPreview(); updateElementSummaries();
      });
    });

    // Gallery
    panel.querySelectorAll(".bib-remove-photo").forEach((btn) => {
      btn.addEventListener("click", () => {
        elById(btn.dataset.id).content.photos.splice(Number(btn.dataset.index), 1);
        markDirty(); renderEditor(); renderPreview();
      });
    });
    panel.querySelectorAll("[id^='gallery-drop-']").forEach((drop) => {
      const id = drop.id.replace("gallery-drop-", "");
      const input = drop.querySelector(".bib-gallery-input");
      wireGalleryDrop(drop, input, id);
    });

    // Social links
    panel.querySelectorAll(".bib-link-label").forEach((input) => {
      input.addEventListener("input", (e) => {
        elById(e.target.dataset.id).content.links[Number(e.target.dataset.index)].label = e.target.value;
        markDirty(); renderPreview();
      });
    });
    panel.querySelectorAll(".bib-link-url").forEach((input) => {
      input.addEventListener("input", (e) => {
        elById(e.target.dataset.id).content.links[Number(e.target.dataset.index)].url = e.target.value;
        markDirty();
      });
    });
    panel.querySelectorAll(".bib-remove-link").forEach((btn) => {
      btn.addEventListener("click", () => {
        elById(btn.dataset.id).content.links.splice(Number(btn.dataset.index), 1);
        markDirty(); renderEditor(); renderPreview();
      });
    });
    panel.querySelectorAll(".bib-add-link-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const el = elById(btn.dataset.id);
        if (!el.content.links) el.content.links = [];
        el.content.links.push({ label: "", url: "" });
        markDirty(); renderEditor();
      });
    });

    // Services
    panel.querySelectorAll(".bib-service-name").forEach((input) => {
      input.addEventListener("input", (e) => {
        elById(e.target.dataset.id).content.services[Number(e.target.dataset.index)].name = e.target.value;
        markDirty(); renderPreview();
      });
    });
    panel.querySelectorAll(".bib-service-price").forEach((input) => {
      input.addEventListener("input", (e) => {
        elById(e.target.dataset.id).content.services[Number(e.target.dataset.index)].price_range = e.target.value;
        markDirty(); renderPreview();
      });
    });
    panel.querySelectorAll(".bib-remove-service").forEach((btn) => {
      btn.addEventListener("click", () => {
        elById(btn.dataset.id).content.services.splice(Number(btn.dataset.index), 1);
        markDirty(); renderEditor(); renderPreview();
      });
    });
    panel.querySelectorAll(".bib-add-service-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const el = elById(btn.dataset.id);
        if (!el.content.services) el.content.services = [];
        el.content.services.push({ name: "", price_range: "" });
        markDirty(); renderEditor();
      });
    });

    // Quote request form
    panel.querySelectorAll(".bib-quote-toggle").forEach((btn) => {
      btn.addEventListener("click", () => {
        const f = elById(btn.dataset.id).content.fields.find((x) => x.id === btn.dataset.field);
        f.enabled = !f.enabled;
        markDirty(); renderEditor();
      });
    });

    // Service area
    const areaInput = panel.querySelector(".bib-servicearea-input");
    if (areaInput) areaInput.addEventListener("input", (e) => { elById(e.target.dataset.id).content.area = e.target.value; markDirty(); updateElementSummaries(); });

    // Booking deposit
    panel.querySelectorAll(".bib-deposit-toggle").forEach((btn) => {
      btn.addEventListener("click", () => {
        const el = elById(btn.dataset.id);
        const on = Number(el.content.deposit_amount) > 0 || el._depositOn;
        if (on) { el.content.deposit_amount = ""; el._depositOn = false; }
        else { el._depositOn = true; }
        markDirty(); renderEditor();
      });
    });
    const depositInput = panel.querySelector(".bib-deposit-amount");
    if (depositInput) depositInput.addEventListener("input", (e) => { elById(e.target.dataset.id).content.deposit_amount = e.target.value; markDirty(); updateElementSummaries(); });

    // Add section
    const addToggle = document.getElementById("add-section-toggle");
    if (addToggle) addToggle.addEventListener("click", () => { addMenuOpen = !addMenuOpen; renderEditor(); });
    panel.querySelectorAll(".bib-add-section-item").forEach((btn) => {
      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        const type = btn.dataset.type;
        if (btn.dataset.gated === "true") {
          if (confirm(`${SECTION_META[type].title} is part of All Access ($9.99/mo) — it won't appear on your page until you upgrade. Go to upgrade now?`)) {
            window.location.href = "/app/dashboard.html";
          }
          return;
        }
        const content = JSON.parse(JSON.stringify(ELEMENT_DEFAULTS[type]));
        elements.push({ id: tempId(), type, position: elements.length, content });
        addMenuOpen = false;
        markDirty();
        renderEditor(); renderPreview();
      });
    });
  }

  // Cheap targeted update for the small section-summary text while typing,
  // without a full editor re-render (which would steal focus from the
  // input the user is actively typing into).
  function updateElementSummaries() {
    document.querySelectorAll(".bib-el-card").forEach((card) => {
      const el = elById(card.dataset.id);
      if (!el) return;
      const summaryEl = card.querySelector(".bib-el-summary");
      if (summaryEl) summaryEl.textContent = summaryFor(el);
    });
  }

  function wireImageDrop(dropEl, inputEl, onUploaded) {
    if (!dropEl || !inputEl) return;
    inputEl.addEventListener("change", (e) => { if (e.target.files[0]) uploadImage(e.target.files[0], onUploaded); });
    dropEl.addEventListener("dragover", (e) => { e.preventDefault(); dropEl.classList.add("drag-over"); });
    dropEl.addEventListener("dragleave", () => dropEl.classList.remove("drag-over"));
    dropEl.addEventListener("drop", (e) => {
      e.preventDefault();
      dropEl.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file) uploadImage(file, onUploaded);
    });
  }

  async function uploadImage(file, onUploaded) {
    const path = `${session.user.id}/${Date.now()}-${file.name}`;
    const { error } = await sb.storage.from("page-photos").upload(path, file);
    if (error) { alert("Upload failed: " + error.message); return; }
    const { data } = sb.storage.from("page-photos").getPublicUrl(path);
    onUploaded(data.publicUrl);
    markDirty();
    renderEditor(); renderPreview();
  }

  function wireGalleryDrop(dropEl, inputEl, elId) {
    if (!dropEl || !inputEl) return;
    inputEl.addEventListener("change", (e) => { if (e.target.files.length) uploadGalleryPhotos(elId, e.target.files); });
    dropEl.addEventListener("dragover", (e) => { e.preventDefault(); dropEl.classList.add("drag-over"); });
    dropEl.addEventListener("dragleave", () => dropEl.classList.remove("drag-over"));
    dropEl.addEventListener("drop", (e) => {
      e.preventDefault();
      dropEl.classList.remove("drag-over");
      if (e.dataTransfer.files.length) uploadGalleryPhotos(elId, e.dataTransfer.files);
    });
  }

  async function uploadGalleryPhotos(elId, files) {
    const el = elById(elId);
    if (!el.content.photos) el.content.photos = [];
    for (const file of files) {
      const path = `${session.user.id}/${Date.now()}-${file.name}`;
      const { error } = await sb.storage.from("page-photos").upload(path, file);
      if (error) { alert("Upload failed: " + error.message); continue; }
      const { data } = sb.storage.from("page-photos").getPublicUrl(path);
      el.content.photos.push(data.publicUrl);
    }
    markDirty();
    renderEditor(); renderPreview();
  }

  // ---------------------------------------------------------------------
  // Save & republish — the single persistence point for every edit made
  // since load (or since the last save).
  async function saveAndRepublish() {
    const btn = document.getElementById("save-republish-btn");
    btn.disabled = true;
    btn.textContent = "Saving...";
    try {
      elements.forEach((el) => {
        if (el.type === "social_link" && el.content.links) {
          el.content.links.forEach((l) => { l.url = normalizeUrl(l.url); });
        }
        if (el.type === "booking_deposit" && !el._depositOn && !(Number(el.content.deposit_amount) > 0)) {
          el.content.deposit_amount = "";
        }
      });

      if (headerElId) {
        const { error } = await sb.from("elements").update({ content: headerContent }).eq("id", headerElId);
        if (error) throw error;
      } else {
        const { data, error } = await sb.from("elements").insert({ page_id: page.id, type: "header", position: 0, content: headerContent }).select().single();
        if (error) throw error;
        headerElId = data.id;
      }

      for (let i = 0; i < elements.length; i++) {
        const el = elements[i];
        if (isTemp(el.id)) {
          const { data, error } = await sb.from("elements").insert({ page_id: page.id, type: el.type, position: i + 1, content: el.content }).select().single();
          if (error) throw error;
          el.id = data.id;
        } else {
          const { error } = await sb.from("elements").update({ content: el.content, position: i + 1 }).eq("id", el.id);
          if (error) throw error;
        }
      }

      if (deletedIds.size) {
        const { error } = await sb.from("elements").delete().in("id", [...deletedIds]);
        if (error) throw error;
        deletedIds.clear();
      }

      const { error: pageErr } = await sb.from("pages").update({
        business_name: headerContent.business_name,
        og_title: headerContent.business_name,
        theme: theme.paletteId,
        custom_accent_color: theme.customAccent || null,
        custom_bg_color: theme.customBg || null,
        font_pair: theme.fontPairId,
      }).eq("id", page.id);
      if (pageErr) throw pageErr;
      page.business_name = headerContent.business_name;
      page.theme = theme.paletteId;

      await callFunction("render-page", { page_id: page.id }, session);

      dirty = false;
      showToast("Saved — live in a few seconds");
    } catch (err) {
      showToast(err.message || "Something went wrong.", true);
    } finally {
      btn.disabled = false;
      btn.textContent = "Save & publish";
    }
  }
  document.getElementById("save-republish-btn").addEventListener("click", saveAndRepublish);

  // ---------------------------------------------------------------------
  (async () => {
    session = await requireSession();
    if (!session) return;

    const { data: pageData } = await sb.from("pages").select("*").eq("user_id", session.user.id).maybeSingle();
    if (!pageData) { window.location.href = "/app/onboarding.html"; return; }
    page = pageData;

    theme = {
      paletteId: page.theme || "coral",
      customAccent: page.custom_accent_color || PALETTES[0].primary,
      customBg: page.custom_bg_color || PALETTES[0].bg,
      fontPairId: page.font_pair || "playful",
    };

    const { data: sub } = await sb.from("subscriptions").select("tier, status").eq("user_id", session.user.id).maybeSingle();
    isPaid = !!(sub && sub.status === "active");

    document.getElementById("page-url").href = `https://bizinbio.net/${page.slug}/`;
    document.getElementById("page-url").textContent = `bizinbio.net/${page.slug}/`;
    document.getElementById("status-badge-text").textContent = page.published ? "Live" : "Not published yet";

    const { data: elData } = await sb.from("elements").select("*").eq("page_id", page.id).order("position", { ascending: true });
    const all = elData || [];
    const header = all.find((e) => e.type === "header");
    if (header) {
      headerElId = header.id;
      headerContent = { business_name: "", location: "", logo_url: "", cover_image_url: "", ...header.content };
    }
    elements = all.filter((e) => e.type !== "header").map((e) => {
      if (e.type === "booking_deposit") e._depositOn = Number(e.content.deposit_amount) > 0;
      return e;
    });

    renderEditor();
    renderPreview();
  })();
</script>
</body>
