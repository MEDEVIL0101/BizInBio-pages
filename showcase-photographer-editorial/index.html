<style>:root{
    --color-bg:#faf6f1;
    --body-bg:#faf6f1;

    --color-surface:#f1ebe2;
    --color-text:#2a2420;
    --color-accent:#b8632f;
    --font-heading:"Fraunces","Georgia",serif;
    --font-heading-weight:600;
    --font-body:"Inter",system-ui,sans-serif;
    --radius-md:10px;

    --card-border-width:1px;

    --heading-letter-spacing:-.01em;

<body>
<div style="max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column">

    
    <div class="cover-photo"><img src="https://picsum.photos/seed/willowcover/1200/500" alt="" /></div>
    <header style="padding:var(--space-6) var(--space-4) var(--space-4);text-align:center">
      <div style="display:flex;justify-content:center;margin-bottom:var(--space-3)"><img src="https://picsum.photos/seed/willowlogo/200" alt="" style="width:72px;height:72px;border-radius:var(--avatar-radius,50%);object-fit:cover;border:1px solid var(--color-divider)" /></div>
      <h1 style="font-size:30px">Willow &amp; Light Photography</h1>
      <p class="text-muted" style="font-size:14px;margin-top:var(--space-2)">Editorial wedding and portrait photography rooted in natural light and quiet moments.</p>
    </header>
    <section style="padding:0 var(--space-4) var(--space-6)"><div class="gallery"><div class="blueprint duotone gallery-photo wide"><img src="https://picsum.photos/seed/w1/600/600" alt="" loading="lazy" /></div><div class="blueprint duotone gallery-photo "><img src="https://picsum.photos/seed/w2/600/600" alt="" loading="lazy" /></div><div class="blueprint duotone gallery-photo "><img src="https://picsum.photos/seed/w3/600/600" alt="" loading="lazy" /></div><div class="blueprint duotone gallery-photo "><img src="https://picsum.photos/seed/w4/600/600" alt="" loading="lazy" /></div></div></section>
    <section style="padding:0 var(--space-4) var(--space-6)"><h6 style="color:var(--color-accent-700);margin-bottom:var(--space-2)">Packages</h6><div class="blueprint" style="position:relative"><div class="rate-row"><span>Full day wedding</span><span class="rate-price">from $3,200</span></div><div class="rate-row"><span>Engagement session</span><span class="rate-price">$450</span></div><div class="rate-row"><span>Portrait session</span><span class="rate-price">$300</span></div></div></section>
    <div style="display:flex;gap:var(--space-2);padding:0 var(--space-4) var(--space-6)"><a href="tel:555-201-4488" class="btn btn-primary" style="flex:1">Call</a><a href="mailto:theme-showcase-photographer@bizinbio.net" class="btn" style="flex:1">Email</a></div>
    <footer style="padding:var(--space-6) var(--space-4);text-align:center;border-top:1px solid var(--color-divider)">
      <div class="social-row" style="margin-bottom:var(--space-3)"><a href="https://instagram.com" class="btn" target="_blank" rel="noopener">Instagram</a></div>
      <span class="text-muted" style="font-size:12px">Powered by BizInBio</span>
    </footer>
