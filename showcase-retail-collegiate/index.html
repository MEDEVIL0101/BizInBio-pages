<style>:root{
    --color-bg:#f7f3ea;
    --body-bg:#f7f3ea;

    --color-surface:#efe8d8;
    --color-text:#1a2340;

    --font-heading-weight:400;
    --font-body:"Barlow",system-ui,sans-serif;
    --radius-md:16px;

<body>
<div style="max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column">

    
    <div class="cover-photo"><img src="https://picsum.photos/seed/marigoldcover/1200/500" alt="" /></div>

      <p class="text-muted" style="font-size:14px;margin-top:var(--space-2)">Small-batch apparel and accessories, designed and printed in-house.</p>
    </header>
    <section style="padding:0 var(--space-4) var(--space-6)"><div class="gallery"><div class="blueprint duotone gallery-photo "><img src="https://picsum.photos/seed/r1/600/600" alt="" loading="lazy" /></div><div class="blueprint duotone gallery-photo "><img src="https://picsum.photos/seed/r2/600/600" alt="" loading="lazy" /></div><div class="blueprint duotone gallery-photo "><img src="https://picsum.photos/seed/r3/600/600" alt="" loading="lazy" /></div><div class="blueprint duotone gallery-photo "><img src="https://picsum.photos/seed/r4/600/600" alt="" loading="lazy" /></div></div></section>

    <div style="display:flex;gap:var(--space-2);padding:0 var(--space-4) var(--space-6)"><a href="tel:555-909-2222" class="btn btn-primary" style="flex:1">Call</a><a href="sms:555-909-2222" class="btn" style="flex:1">Text</a><a href="mailto:theme-showcase-retail@bizinbio.net" class="btn" style="flex:1">Email</a></div>
    <footer style="padding:var(--space-6) var(--space-4);text-align:center;border-top:1px solid var(--color-divider)">
      <div class="social-row" style="margin-bottom:var(--space-3)"><a href="https://instagram.com" class="btn" target="_blank" rel="noopener">Instagram</a></div>
      <span class="text-muted" style="font-size:12px">Powered by BizInBio</span>
