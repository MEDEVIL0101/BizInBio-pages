<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #FAFAFA; color: #1C1C1E; }
  .bib-page { max-width: 480px; margin: 0 auto; padding: 24px 20px 60px; }
  .bib-header { text-align: center; margin-bottom: 20px; }
  .bib-logo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; }
  .bib-header h1 { font-size: 22px; margin: 8px 0 4px; }
  .bib-tagline { color: #6B6B6B; margin: 0; }
  section { margin: 24px 0; }
  .bib-social { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .bib-social-link, .bib-cta { display: inline-block; padding: 12px 20px; border-radius: 999px; background: #1C1C1E; color: #fff; text-decoration: none; font-weight: 600; }
  .bib-contact { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .bib-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .bib-gallery img { width: 100%; border-radius: 12px; aspect-ratio: 1; object-fit: cover; }
  .bib-services ul { list-style: none; padding: 0; }
  .bib-services li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #EEE; }
  .bib-price { color: #6B6B6B; }
  .bib-badge { display: inline-block; background: #EEE; padding: 6px 14px; border-radius: 999px; font-size: 13px; color: #4A4A4A; }
  form { display: flex; flex-direction: column; gap: 10px; }
  input, textarea { padding: 14px; border-radius: 10px; border: 1px solid #DDD; font-size: 16px; }
  button { padding: 14px; border-radius: 10px; border: none; background: #1C1C1E; color: #fff; font-weight: 600; font-size: 16px; }
  .bib-quote-status { text-align: center; color: #6B6B6B; }
</style>
</head>
<body>
<div class="bib-page">

        <header class="bib-header">
          
          <h1>Diana's Test Studio</h1>
          
        </header>
<section class="bib-about"><p></p></section>


<section class="bib-contact"><a class="bib-cta" href="tel:555-123-4567">Call</a><a class="bib-cta" href="sms:555-123-4567">Text</a><a class="bib-cta" href="mailto:test-prototype@bizinbio.net">Email</a></section>

        <section class="bib-quote-form">
          <h2>Get a quote</h2>
          <form id="bib-quote-form">
            <input name="name" placeholder="Your name" required />
            <input name="contact_info" placeholder="Phone or email" required />
            <textarea name="message" placeholder="Tell us about the job"></textarea>
            <button type="submit">Send request</button>
          </form>
          <p id="bib-quote-status" class="bib-quote-status"></p>
        </section>
        <script>
          document.getElementById('bib-quote-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            var form = e.target;
            var status = document.getElementById('bib-quote-status');
            var payload = {
              page_id: "a25506a0-bc2a-4a45-acf2-c5ab48a1db23",
              name: form.name.value,
              contact_info: form.contact_info.value,
              message: form.message.value
            };
            status.textContent = 'Sending...';
            try {
              var res = await fetch("https://eqsxcbmcsjrtnkevaygy.supabase.co" + '/rest/v1/quote_requests', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'apikey': "sb_publishable_DPifKzXa875ieM2CLgMieA_VJyYRa-6",
                  'Authorization': 'Bearer ' + "sb_publishable_DPifKzXa875ieM2CLgMieA_VJyYRa-6"
                },
                body: JSON.stringify(payload)
              });
              if (!res.ok) throw new Error('failed');
              status.textContent = 'Thanks! Your request was sent.';
              form.reset();
            } catch (err) {
              status.textContent = 'Something went wrong — please try again.';
            }
          });
        </script>
</div>
</body>
