<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

</head>
<body>
<div style="max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column">

    <header style="padding:var(--space-8) var(--space-4) var(--space-4)">
      <h6 style="color:var(--color-accent-700)">Professional Services</h6>
      <h1 style="margin-top:var(--space-2);font-size:28px">Harlow &amp; Cole Accounting</h1>
      
      
    </header>
    <div style="display:flex;gap:var(--space-2);padding:0 var(--space-4) var(--space-6)"><a href="tel:555-333-9999" class="btn" style="flex:1">Call</a><a href="mailto:design-v2-test@bizinbio.net" class="btn" style="flex:1">Email</a></div>
    
    
    <section style="padding:0 var(--space-4) var(--space-6)">
      <h6 style="color:var(--color-accent-700);margin-bottom:var(--space-3)">Request a consultation</h6>
      <div class="field"><label>Your name</label><input class="input" name="name" id="bib-q-name" /></div>
      <div class="field"><label>Phone or email</label><input class="input" name="contact_info" id="bib-q-contact" /></div>
      <div class="field"><label>Details</label><textarea class="input" name="message" id="bib-q-message" placeholder="What do you need help with?"></textarea></div>
      <button id="bib-quote-submit" class="btn btn-primary btn-block">Send request</button>
      <p id="bib-quote-status" class="text-muted" style="text-align:center;font-size:12px;margin-top:var(--space-2)"></p>
    </section>
    <script>
      document.getElementById('bib-quote-submit').addEventListener('click', async function () {
        var status = document.getElementById('bib-quote-status');
        var payload = {
          page_id: "187eea81-edba-49e8-ace6-8fa9a44f4295",
          name: document.getElementById('bib-q-name').value,
          contact_info: document.getElementById('bib-q-contact').value,
          message: document.getElementById('bib-q-message').value
        };
        status.textContent = 'Sending...';
        try {
          var res = await fetch("https://eqsxcbmcsjrtnkevaygy.supabase.co" + '/rest/v1/quote_requests', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': "sb_publishable_DPifKzXa875ieM2CLgMieA_VJyYRa-6",
              'Authorization': 'Bearer ' + "sb_publishable_DPifKzXa875ieM2CLgMieA_VJyYRa-6"
            },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error('failed');
          status.textContent = 'Thanks! Your request was sent.';
          document.getElementById('bib-q-name').value = '';
          document.getElementById('bib-q-contact').value = '';
          document.getElementById('bib-q-message').value = '';
        } catch (err) {
          status.textContent = 'Something went wrong — please try again.';
        }
      });
    </script>
    <footer style="padding:var(--space-6) var(--space-4);text-align:center;border-top:1px solid var(--color-divider)"><span class="text-muted" style="font-size:12px">Powered by BizInBio</span></footer>
</div>
</body>
</html>
